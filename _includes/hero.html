<header id="{{ t.toc_hero_id }}">
  <div class="container header-content">
    <h1 itemprop="slogan">{{ t.slogan }}</h1>
    <p class="big">{{ t.description }}</p>
    <a
      aria-label="{{ t.learn_more_aria }}"
      class="btn-primary btn-xl mt-4 mb-24"
      data-squircle-radius
      href="#{{ t.toc_overview_id }}"
    >
      {{ t.learn_more }}
    </a>
  </div>
</header>
