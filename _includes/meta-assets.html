<!-- Preload LCP hero image so the browser discovers it before CSS is parsed -->
<link
  as="image"
  fetchpriority="high"
  href="{{ site.url }}/img/hero/hero-1920.avif"
  rel="preload"
  type="image/avif"
/>

<link href="https://fonts.googleapis.com" rel="preconnect" />
<link
  crossorigin="anonymous"
  href="https://fonts.gstatic.com"
  rel="preconnect"
/>
<!-- Load the font CSS without blocking render: `media="print"` lets the browser
     fetch it off the critical path, then `onload` promotes it to `all` so the
     font applies as soon as it's ready. `display=swap` keeps text visible in the
     system fallback meanwhile, and the <noscript> copy serves no-JS visitors. -->
<link
  href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
  rel="stylesheet"
  media="print"
  onload="this.media='all'"
/>
<noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
    rel="stylesheet"
  />
</noscript>
<link
  href="{{ site.url }}/apple-touch-icon.png"
  rel="apple-touch-icon"
  sizes="180x180"
/>
<link
  href="{{ site.url }}/favicon.svg"
  rel="icon"
  sizes="any"
  type="image/svg+xml"
/>
<link
  href="{{ site.url }}/favicon-32x32.png"
  rel="icon"
  sizes="32x32"
  type="image/png"
/>
<link
  href="{{ site.url }}/favicon-16x16.png"
  rel="icon"
  sizes="16x16"
  type="image/png"
/>
<link href="{{ site.url }}/site.webmanifest" rel="manifest" />
