<!-- Preload LCP hero image so the browser discovers it before CSS is parsed -->
<link
  as="image"
  fetchpriority="high"
  href="{{ site.url }}/img/hero/hero-1920.avif"
  rel="preload"
  type="image/avif"
/>

<!-- Self-hosted Public Sans — the @font-face rules ship in main.css (see
     _sass/_fonts.scss), so no font stylesheet request and no third-party
     connection to fonts.googleapis.com / fonts.gstatic.com (also closes the
     GDPR IP-leak that the regional Consent Mode in page.html cares about).
     These preloads kick off the most-used subset right away so the swap from
     the system fallback is fast. latin covers ASCII on every page; vi pages
     (the default locale) also preload the vietnamese subset. -->
<link
  as="font"
  crossorigin="anonymous"
  href="{{ site.url }}/fonts/public-sans/public-sans-latin.woff2"
  rel="preload"
  type="font/woff2"
/>
{% if page.lang == "vi" %}
<link
  as="font"
  crossorigin="anonymous"
  href="{{ site.url }}/fonts/public-sans/public-sans-vietnamese.woff2"
  rel="preload"
  type="font/woff2"
/>
{% endif %}
<link
  href="{{ site.url }}/apple-touch-icon.png"
  rel="apple-touch-icon"
  sizes="180x180"
/>
<link
  href="{{ site.url }}/favicon.svg"
  rel="icon"
  sizes="any"
  type="image/svg+xml"
/>
<link
  href="{{ site.url }}/favicon-32x32.png"
  rel="icon"
  sizes="32x32"
  type="image/png"
/>
<link
  href="{{ site.url }}/favicon-16x16.png"
  rel="icon"
  sizes="16x16"
  type="image/png"
/>
<link href="{{ site.url }}/site.webmanifest" rel="manifest" />
