<!-- Viewport & Encoding -->
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<meta content="light" name="color-scheme" />
<meta content="#e35205" name="theme-color" />
<meta content="{{ t.social_description }}" name="description" />
<meta content="{{ t.keywords }}, Alpha Software" name="keywords" />
<meta content="index, follow" name="robots" />

<!-- Open Graph & Organization Microdata -->
<meta content="website" property="og:type" />
<meta content="Alpha Software" itemprop="name" property="og:site_name" />
<meta content="{{ t.legal_name }}" itemprop="alternateName" />
<meta content="https://www.alphasoftwaregroup.com" itemprop="url" />
<meta
  content="https://www.alphasoftwaregroup.com{{ t.homeurl }}"
  property="og:url"
/>
<meta
  content="https://www.alphasoftwaregroup.com/img/logo/alpha-open-graph.png"
  itemprop="logo"
/>
<meta
  content="https://www.alphasoftwaregroup.com/img/logo/alpha-open-graph.png"
  itemprop="image"
  property="og:image"
/>
<meta content="1200" property="og:image:width" />
<meta content="630" property="og:image:height" />
<meta content="Alpha Software logo" property="og:image:alt" />
<meta content="{{ t.og_locale }}" property="og:locale" />

<meta content="Phan Đức Tuấn Anh" itemprop="founder" />
<meta content="2021-01-20" itemprop="foundingDate" />
<meta content="+84983505002" itemprop="telephone" />
<meta
  content="https://www.facebook.com/profile.php?id=100070371223404"
  itemprop="sameAs"
/>
<meta content="0316685078" itemprop="taxID" />

<meta content="Alpha Software: {{ t.slogan }}" property="og:title" />
<meta
  content="{{ t.og_description }}"
  itemprop="description"
  property="og:description"
/>

<!-- Twitter / X Card -->
<meta content="summary_large_image" name="twitter:card" />
<meta content="Alpha Software: {{ t.slogan }}" name="twitter:title" />
<meta content="{{ t.twitter_description }}" name="twitter:description" />
<meta
  content="https://www.alphasoftwaregroup.com/img/logo/alpha-open-graph.png"
  name="twitter:image"
/>

<!-- Hreflang — bilingual alternates -->
<link rel="alternate" hreflang="vi" href="https://www.alphasoftwaregroup.com/" />
<link rel="alternate" hreflang="en" href="https://www.alphasoftwaregroup.com/en/" />
<link rel="alternate" hreflang="x-default" href="https://www.alphasoftwaregroup.com/" />

<!-- Canonical -->
<link
  href="https://www.alphasoftwaregroup.com{{ t.homeurl }}"
  rel="canonical"
/>

<!-- Stylesheet -->
<link href="{{ site.url }}/css/main.css" rel="stylesheet" />

<!-- Structured Data -->
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@id": "https://www.alphasoftwaregroup.com{{ t.homeurl }}#website",
    "@type": "WebSite",
    "name": "Alpha Software",
    "alternateName": "{{ t.legal_name }}",
    "url": "https://www.alphasoftwaregroup.com{{ t.homeurl }}"
  }
</script>

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@id": "https://www.alphasoftwaregroup.com{{ t.homeurl }}#webpage",
    "@type": "WebPage",
    "isPartOf": { "@id": "https://www.alphasoftwaregroup.com{{ t.homeurl }}#website" },
    "name": "Alpha Software: {{ t.slogan }}",
    "description": "{{ t.og_description }}",
    "url": "https://www.alphasoftwaregroup.com{{ t.homeurl }}"
  }
</script>
