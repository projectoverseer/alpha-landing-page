email: alphasoftware102@gmail.com
description:
  Alpha Software chuyên cung cấp phần mềm quản lý nhà máy, dệt may, và giải pháp chuyển đổi số giúp doanh nghiệp phát
  triển bền vững.
url: https://www.alphasoftwaregroup.com
baseurl: ""
facebook_page: https://www.facebook.com/alphasoftwaregroup

# Chia sẻ kinh nghiệm hub (/chia-se-kinh-nghiem/) — posts are articles there.
# Layout + permalink centralized so a post's front matter stays minimal.
permalink: /chia-se-kinh-nghiem/:title/
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "chia-se-kinh-nghiem-article"

# Build settings
exclude:
  - node_modules/
  - .assets_backup/
  - content-archive/
  - design/
  - docs/
  - performance-audits/
  - package-lock.json
  - package.json
  - optimize-js.mjs
  - optimize-css.mjs
  - optimize-math.mjs
  - fingerprint.mjs
  - publish.mjs
  - preview.mjs
  - ship.mjs
  - verify.mjs
  - update-sitemap.mjs
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
