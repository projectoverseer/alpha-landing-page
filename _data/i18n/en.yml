# --- Overview Section ---

overview_title: "Introducing the Alpha Smart Dyehouse Factory Management System"

feature_tech_mgmt_title: "Smart technology management"
feature_tech_mgmt_point_1: "The software gives your chief engineer the tools to capture the company's technological know-how and store it in the system."
feature_tech_mgmt_point_2: "With a single click, the software selects the exact technology to apply to each batch. This reduces your dependence on highly skilled technicians — and because every batch is processed with the same technology, quality becomes stable and repeatable."

feature_planning_title: "Visual production planning"
feature_planning_point_1: "Plans are created and adjusted quickly and intuitively, with simple drag-and-drop."
feature_planning_point_2: "When one batch is rescheduled, the entire plan adjusts automatically — the schedule stays perfectly in sync."
feature_planning_point_3: "The plan board on the production floor gives a clear visual picture of the schedule and enforces the planned sequence of work."

feature_equipment_integration_title: "Integration with production and lab equipment"
feature_equipment_integration_point_1: "Automatic devices that currently operate in isolation can be connected to the software, forming one synchronized system."
feature_equipment_integration_point_2: "We can also convert equipment operated by hand — with switches and push buttons — into automated, process-controlled machines connected to the software."

feature_customization_title: "Customized for each factory"
feature_customization_point_1: "Every factory manages production differently. We survey each one carefully, design and implement the system to fit, and keep improving it so the factory runs more efficiently over time."
feature_customization_point_2: "Throughout our partnership, we also advise you on process improvements that raise efficiency and cut waste."

feature_ease_of_use_title: "Very easy to use!"
feature_ease_of_use_desc: "We always design for the simplest possible operation, with the fewest steps — so everyone, from machine operators to office staff, can use the software with ease, even without basic computer skills."

# --- Benefits Section ---

benefits_title: "Why Factories Need Alpha Software"

benefit_quality_title: "Significantly improve product quality"
benefit_quality_desc: "Our long experience in textile technology lets us map the know-how of your factory's own experts — or outside specialists — and apply it automatically and precisely in production, <strong>dramatically improving your Right-First-Time (RFT) rate.</strong>"

benefit_staffing_costs_title: "Reduce staffing needs and costs"
benefit_staffing_costs_desc: "While surveying your factory and developing the software, we identify which tasks the software can take over and perform automatically — reducing both the need for and the cost of manual labor."

benefit_error_reduction_title: "Minimize the risk of worker error"
benefit_error_reduction_desc: "We have worked at every level of this industry — technical management, line management, and dyehouse management — so we understand exactly where errors creep into the work of employees at each level. That experience is built into Alpha's software, giving it an exceptional ability to prevent mistakes before they happen."

benefit_equipment_retrofit_title: "Get more from your existing equipment"
benefit_equipment_retrofit_desc: "We have the expertise to connect automated equipment into the system, and to convert manually switched machines to automatic operation — reducing the need for highly skilled operators and eliminating manual operating errors."

# --- Products Section ---

products_title: "Alpha Software Products"
product_1: "Alpha Smart Dyehouse"
alpha_smart_dyehouse: 'Alpha Smart Dyehouse <span class="mini-h3">Factory Management System</span>'
alpha_smart_dyehouse_content: '<h4>1. Introduction</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> is a comprehensive software solution that digitizes and automates every process in the dyehouse. The system covers everything from order management, dye planning, and color formulation through to dyeing, quality control, and packing.
            </p>
            <p>
              The dye recipe — the single factor with the greatest influence on dyeing quality — is managed intelligently and generated automatically by the software, with no need for a dedicated recipe technician.
            </p>
            <p>
              The software also guides each batch along its technological path, guaranteeing that no batch is ever processed with missing, extra, or out-of-order steps.
            </p>
            <p>
              The solution connects directly to the hardware in your factory, raising the level of automation and minimizing production errors.
            </p>

            <h4>2. Features</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> fully supports every stage of the dyeing process, including:
            </p>
            <ul>
              <li>Order management and progress tracking</li>
              <li>Dye planning</li>
              <li>Color formula and recipe management</li>
              <li>Dye and chemical weighing</li>
              <li>Production process management</li>
              <li>Quality standards management</li>
              <li>Execution of dyeing and post-dyeing processes</li>
              <li>Quality control and packing</li>
              <li>Warehouse management for chemicals, raw materials, and finished goods</li>
            </ul>
            <h4>3. Seamless Integration with Dyeing Equipment</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> integrates deeply with the equipment in your dyehouse. The solution communicates with devices such as dye scales, lab dispensers, bulk dispensers, and lab spectrophotometers. Alpha has also developed two specialized hardware devices of its own — <strong>Alpha Dyes Weighing</strong> and the Alpha Dyeing Controller — ensuring tight synchronization and high efficiency across the entire system.
            </p>'
product_2: "Alpha Dyes Weighing"
alpha_dyes_weighing: 'Alpha Dyes Weighing <span class="mini-h3">Semi-Automatic Dye Scale</span>'
alpha_dyes_weighing_content: '<h4>1. Introduction</h4>
            <p>
              <strong>Alpha Dyes Weighing</strong> is specialized software that supports the dye-weighing process in textile dyehouses. It is designed to give the operator maximum accuracy, safety, and convenience throughout dye preparation.
            </p>
            <h4>2. Key Distinguishing Features</h4>
            <ul class="spaced-items">
              <li>
                <b>LED position indicators:</b> An intuitive LED display shows the operator exactly which dye container to pick up.
              </li>
              <li>
                <b>QR-code dye verification:</b> Scanning the QR code confirms the right dye has been picked up — preventing mix-ups and improving production safety.
              </li>
              <li>
                <b>Voice guidance while weighing:</b> The software talks the operator through the weighing process step by step, in their own language — speeding up the work while minimizing errors.
              </li>
              <li>
                <b>Multi-scale connectivity:</b> Connects to up to three electronic scales at once. The software works with <strong>every brand</strong> of electronic scale that can transmit data to a computer.
              </li>
              <li>
                <b>Compensates for color-strength variation between dye lots:</b> Purchased dye lots typically vary in color strength by 3–5% from the standard lot. The software adjusts for this automatically, so switching to a new dye lot never shifts the color.
              </li>
              <li>
                <b>Flexible hardware budget:</b> Alpha supplies the software; the computers, electronic scales, and dye-container shelving are purchased by the customer. This keeps the initial investment low and gives each factory full flexibility.
              </li>
            </ul>'

