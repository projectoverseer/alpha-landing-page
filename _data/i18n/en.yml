our_story_body: '<p class="mt-md-0">Alpha Software was founded in 2021 by Mr. Phan Đức Tuấn Anh, who brings more than 28 years of hands-on experience in the textile industry — 13 as a dyeing technician and 15 as a factory director. With a strong foundation in organic chemistry and a deep command of factory management and software development, Mr. Tuấn Anh leads Alpha in delivering practical technology that meets the real needs of modern textile manufacturers.</p>'

