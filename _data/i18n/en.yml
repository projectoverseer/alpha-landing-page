# --- Overview Section ---

overview_title: "Introducing Alpha&nbsp;Smart&nbsp;Dyehouse Factory&nbsp;Management&nbsp;System"

feature_tech_mgmt_title: "Smart technology management"
feature_tech_mgmt_point_1: "There are tools for the chief engineer to store the company's technological knowledge into the software."
feature_tech_mgmt_point_2: "The software will find the exact technology to apply to the batch with just one click. This not only helps the company reduce the number of highly skilled technicians, but also ensures that all batches are processed with the same technology, thereby stabilizing quality."

feature_planning_title: "Visual production planning"
feature_planning_point_1: "Planning and adjusting plans are done quickly and visually by dragging-and-dropping."
feature_planning_point_2: "When a batch plan is adjusted, the entire plan is automatically adjusted. This ensures that the plan is in perfect sync."
feature_planning_point_3: "The production plan dashboard visually represents and controls compliance with established sequences."

feature_equipment_integration_title: "Integration with production and lab equipment"
feature_equipment_integration_point_1: "With automatic but separately operating devices, we can help connect to the software system to form a synchronized system."
feature_equipment_integration_point_2: "We can also help convert manually operated equipment using switches and push buttons into automated process control systems connected to the software."

feature_customization_title: "Customized for each factory"
feature_customization_point_1: "We understand that each factory has different management standards. Therefore, we always conduct careful surveys to design and implement appropriately, continuously improving to help the factory operate more and more efficiently."
feature_customization_point_2: "In addition, during the cooperation process, we are also able to advise customers on process improvement to achieve efficiency and savings."

feature_ease_of_use_title: "Very easy to use!"
feature_ease_of_use_desc: "We always aim for the simplest way to operate the software, requiring the least amount of operations so that everyone—from factory workers to office staff, even without basic computer knowledge, can easily use the software."

# --- Benefits Section ---

benefits_title: "Why Factories Need Alpha&nbsp;Software"

benefit_quality_title: "Significantly improve product quality"
benefit_quality_desc: "Thanks to our long-term experience in the textile industry, we know how to map the technological knowledge of the factory's internal experts or external experts, apply that technology automatically and accurately to production, thereby <strong>greatly improving Right First Time rate (RFT).</strong>"

benefit_staffing_costs_title: "Reduce staffing costs"
benefit_staffing_costs_desc: "During the software research and development process, we will identify which tasks can be automated by the software, thereby reducing the need for and cost of human resources."

benefit_error_reduction_title: "Minimize the risk of worker error"
benefit_error_reduction_desc: "Having worked in various positions in the textile industry from technical management, line management to dyeing factory management, we understand the risks of errors that may occur in the work process of employees at all levels. Thanks to that, Alpha Software's software has a very high ability to prevent errors."

benefit_equipment_retrofit_title: "Modify &amp; enhance existing equipment"
benefit_equipment_retrofit_desc: "We have the expertise and experience in connecting to automated equipment and converting equipment that is operated by manual switches to automatic operation. This reduces the need for highly skilled personnel and reduces operator errors."

# --- Products Section ---

products_title: "Alpha&nbsp;Software Products"
product_1: "Alpha Smart Dyehouse"
alpha_smart_dyehouse: 'Alpha Smart Dyehouse <span class="mini-h3">Factory Management System</span>'
alpha_smart_dyehouse_content: '<h4>1. Introduction</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> is a comprehensive software solution that digitizes and automates every process in the factory. The system integrates everything from order management, dyeing planning, color formulation, to dyeing, quality control and packaging.
            </p>
            <p>
              The dyeing recipe is an important factor that greatly affects the dyeing quality and is intelligently managed and automatically generated by the software without the need for a specialized technician for this task.
            </p>
            <p>
              The technological path of the batch is also guided by the software to ensure that no batch is processed with missing, excess or incorrect steps.
            </p>
            <p>
              The solution also allows direct connection to hardware devices in the factory to increase the level of automation and minimize errors in production.
            </p>

            <h4>2. Features</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> fully supports all stages of the dyeing process, including:
            </p>
            <ul>
              <li>Managing and tracking order progress</li>
              <li>Dyeing planning</li>
              <li>Color formula and recipe management</li>
              <li>Dye and chemical weighing</li>
              <li>Production process management</li>
              <li>Quality standards management</li>
              <li>Execution of dyeing and post-dyeing processes</li>
              <li>Quality control and packaging</li>
              <li>Management of chemical, raw material, and finished goods warehouse</li>
            </ul>
            <h4>3. Seamless Integration with Dyeing Equipment</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> is capable of deep integration with the equipment system of the dyeing factory. The solution supports communication with equipment such as dyestuff weighing, lab dispensing, bulk dispensing, lab spectrometers, etc. In particular, Alpha develops two specialized hardware devices including <strong>Alpha Dyes Weighing</strong> and Alpha Dyeing Controller, helping to ensure synchronization and high efficiency in the entire system.
            </p>'
product_2: "Alpha Dyes Weighing"
alpha_dyes_weighing: 'Alpha Dyes Weighing <span class="mini-h3">Semi-Automatic Dye Scale</span>'
alpha_dyes_weighing_content: '<h4>1. Introduction</h4>
            <p>
              <strong>Alpha Dyes Weighing</strong> is a specialized software that supports the dye weighing process in textile dyeing factories. The software is designed to ensure maximum accuracy, safety and convenience for the operator during the dye preparation process.
            </p>
            <h4>2. Key Distinguishing Factors</h4>
            <ul class="spaced-items">
              <li>
                <b>LED position indicator system:</b> Helps operators easily locate the dye tank to be retrieved through the intuitive LED display system.
              </li>
              <li>
                <b>QR code dye identification:</b> Scan the QR code to ensure the correct dye is obtained, avoid confusion and improve production safety.
              </li>
              <li>
                <b>Voice guidance during the weighing process:</b> The software guides the operator step by step through the weighing process using voice in their own language, helping them to operate quickly while minimizing errors.
              </li>
              <li>
                <b>Multi-electronic scale connection:</b> Supports simultaneous connection with 3 electronic scales. The software is compatible with <strong>all brands</strong> of electronic scales as long as they permit transmitting data to the computer.
              </li>
              <li>
                <b>Adapts to color intensity variations between dye lots:</b>
                Purchased dye lots often have color strength variations of 3% to 5% compared to the standard lot. The software automatically adjusts to compensate for this variation, helping to avoid color errors when switching to a new dye lot.
              </li>
              <li>
                <b>Flexible hardware budget:</b> Alpha provides the software. Computers, electronic scales and dye tank shelves will be invested by the customer. This helps to minimize initial investment costs and increase flexibility for each factory.
              </li>
            </ul>'

