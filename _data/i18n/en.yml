review_nguyen_thi_nga_body: '<p>Alpha Software has helped SPICA connect effectively with our dyeing equipment — the Spectro machines, lab dispensers, and dyeing-machine controllers — greatly reducing manual-operation errors. Managing dye recipes has become far easier, dyeing plans are accurate, and the entire process is tightly controlled through QR codes and an intuitive reporting system.</p>
  <p>Since implementing the software, our right-first-time (RFT) dyeing rate has risen from 80% to 90% per batch, and from 90% to 95% by volume — on track toward our targets of 93% and 98% in the near future.</p>'

review_dinh_van_hiep_body: '<p>Alpha Software has been a great help to our company, especially as a business with many production stages. Alpha also stands apart from other management software in how flexibly and precisely it can be customized to the user''s requirements. Every parameter is presented clearly and in detail.</p>'

