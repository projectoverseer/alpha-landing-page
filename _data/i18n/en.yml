review_nguyen_thi_nga_body: '<p>Alpha Software has helped SPICA effectively connect with dyeing equipment such as Spectro machines, color extraction devices, and dyeing machine controllers, thereby minimizing manual operation errors. Managing dyeing recipes has become much easier, enabling accurate dyeing plans and tightly controlled processes through QR codes and an intuitive reporting system.</p>
  <p>After implementing the software, our right-first-time dyeing rate (RFT) increased from 80% to 90% per batch, and from 90% to 95% by volume — moving steadily toward our targets of 93% and 98% in the near future.</p>'

review_dinh_van_hiep_body: '<p>Alpha Software has been a great support to our company, especially as a business with many production stages. Additionally, Alpha stands out from other management software due to its flexibility and detailed customization based on user requirements. Every parameter is clearly and precisely presented.</p>'

