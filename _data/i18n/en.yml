overview_title: "Introducing Alpha&nbsp;Smart&nbsp;Dyehouse factory management system"
hjk_1: "Visual production planning"
hjk_2: "Planning and adjusting plans are done quickly and visually by dragging-and-dropping."
hjk_3: "When a batch plan is adjusted, the entire plan is automatically adjusted. This ensures that the plan is in perfect sync."
hjk_4: "The production plan dashboard visually represents and controls compliance with established sequences."
hjk_5: "Smart technology management"
hjk_6: "There are tools for the chief engineer to store the company's technological knowledge into the software."
hjk_7: "The software will find the exact technology to apply to the batch with just one click. This not only helps the company reduce the size of highly skilled personnel, but also ensures that all batches are processed with the same technology, thereby stabilizing quality."
hjk_8: "Integration with manufacturing and lab equipments"
hjk_9: "With autonomous but independent operating devices, we can help connect to the software system to form a unified system."
hjk_10: "We can also help convert equipment that is operated manually through switches and push buttons into automated process control and connected to software systems."
hjk_11: "Customized for each factory"
hjk_12: "We understand that each factory has a different management standards. Therefore, we always conduct careful surveys to design and implement appropriately, continuously improving to help the factory operate more and more efficiently."
hjk_13: "In addition, during the cooperation process, we are also able to advise customers on process improvement to achieve efficiency and savings."
hjk_14: "Very easy to use"
hjk_15: "We always aim for the simplest way to operate the software, requiring the least amount of operations so that workers and office staff, even without basic computer knowledge, can still use the software with ease."
benefits_title: "Why factories should choose Alpha&nbsp;Software"
hjk_16: "Significantly improve product quality"
hjk_17: "Thanks to our long-term experience in technology engineering in the industry, we know how to map the technological knowledge of the factory's internal experts or external experts, apply that technology automatically and accurately to production, thereby greatly improving the rate of right products from the first time (RFT—Right First Time)."
hjk_18: "Minimize the risk of worker error"
hjk_19: "Having worked in various positions in the industry from technical management, line management to dyeing factory management, we understand the risks of errors that may occur in the work process of employees at all levels. Thanks to that, Alpha&nbsp;Software's software has a very high ability to prevent errors."
hjk_20: "Reduce staffing costs"
hjk_21: "During the software research and development process, we will identify which tasks can be automated by the software, thereby reducing the need for and cost of human resources."
hjk_22: "Enhance existing equipments"
hjk_23: "We have the expertise and experience to connect to automated equipment or convert equipment that is operated by manual switches to automatic operation. This reduces the need for highly skilled personnel and reduces operator errors."
products_title: "Alpha Software Products"
alpha_smart_dyehouse: 'Alpha Smart Dyehouse <span class="mini-h3">Factory Management System</span>'
alpha_smart_dyehouse_content: '<h4>1. Introduction</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> is a comprehensive software solution that digitizes and automates the entire dyeing process in the factory. The system integrates everything from order management, dyeing planning, color formulation, to dyeing, quality control and packaging.
            </p>
            <p>
              The dyeing technology is an important factor that greatly affects the dyeing quality and is intelligently managed and automatically generated by the software without the need for a specialized technician for this task.
            </p>
            <p>
              The technological path of the batch is also guided by the software to ensure that no batch is processed with missing, excess or incorrect steps.
            </p>
            <p>
              The solution also allows direct connection to hardware devices in the factory to increase the level of automation and minimize errors in production.
            </p>

            <h4>2. Features</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> fully supports all stages of the dyeing process, including:
            </p>
            <ul>
              <li>Manage and track order progress</li>
              <li>Dyeing planning</li>
              <li>Color formula and technology menu management</li>
              <li>Software for dyes and chemical weighing</li>
              <li>Technology process management</li>
              <li>Quality standards management</li>
              <li>Dyeing and post-dyeing procedures</li>
              <li>Quality control and packaging</li>
              <li>Chemical warehouse, raw and finished product warehouse management</li>
            </ul>
            <h4>
              3. Seamless Integration with Dyeing Equipment
            </h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> is capable of deep integration with the equipment system of the dyeing factory. The solution supports communication with equipment such as drug scales, color filling machines, chemical pumps, LAB spectrometers, etc. In particular, Alpha develops two specialized hardware devices including Alpha Drug Scale and Alpha Process Unit (dyeing machine controller), helping to ensure synchronization and high efficiency in the entire system.
            </p>'
alpha_dyes_weighing: 'Alpha Dyes Weighing <span class="mini-h3">Smart Dye Scale</span>'
alpha_dyes_weighing_content: '<h4>1. Introduction</h4>
            <p>
              <strong>Alpha Dyes Weighing</strong> is a specialized software that supports the dye weighing process in textile dyeing factories. The software is designed to ensure maximum accuracy, safety and convenience for the operator during the dye preparation process.
            </p>
            <h4>2. Key Distinguishing Factors</h4>
            <ul class="spaced-items">
              <li>
                <b>LED position indicator system:</b> Helps operators easily locate the dye tank to be retrieved through the intuitive LED display system.
              </li>
              <li>
                <b>QR code dye identification:</b> Scan the QR code to ensure the correct dye is obtained, avoid confusion and improve production safety.
              </li>
              <li>
                <b>Voice guidance during the weighing process:</b> The software has the function of guiding the operator step by step during the weighing process through voice in their own language, helping to operate quickly and reduce errors.
              </li>
              <li>
                <b>Multi-electronic scale connection:</b> Supports simultaneous connection with 3 electronic scales. The software is compatible with all brands of electronic scales as long as they have the function of transmitting data to the computer.
              </li>
              <li>
                <b
                  >Adapts to color intensity variations between dye lots:</b
                >
                Purchased dye lots often have color intensity variations of 3% to 5% compared to the original lot. The software automatically adjusts to accommodate this variation, helping to avoid color errors when switching to a new dye lot.
              </li>
              <li>
                <b>Flexible hardware budget:</b> Alpha provides the software. Computers, electronic scales and dye tank shelves will be invested by the customer. This helps to minimize initial investment costs and increase flexibility for each factory.
              </li>
            </ul>'
