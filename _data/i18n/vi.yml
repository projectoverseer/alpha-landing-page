overview_title: "Giới&nbsp;thiệu phần&nbsp;mềm quản&nbsp;lý nhà&nbsp;máy thông&nbsp;minh của Alpha&nbsp;Software"
hjk_1: "Lập&nbsp;kế&nbsp;hoạch sản&nbsp;xuất trực&nbsp;quan"
hjk_2: "Thao tác lập kế hoạch, điều chỉnh kế hoạch được thực hiện một cách dễ dàng nhanh chóng bằng cách kéo-thả."
hjk_3: "Khi có sự điều chỉnh kế hoạch của một mẻ hàng, toàn bộ bảng kế hoạch sẽ được tự động điều chỉnh theo. Điều này giúp bảng kế hoạch có sự đồng bộ tuyệt đối."
hjk_4: "Bảng triển khai kế hoạch tại nơi sản xuất thể hiện trực quan và kiểm soát việc tuân thủ trình tự đã được lập."
hjk_5: "Quản&nbsp;lý công&nbsp;nghệ thông&nbsp;minh"
hjk_6: "Có công cụ để người kỹ thuật trưởng lưu trữ tri thức công nghệ của công ty vào phần mềm."
hjk_7: "Phần mềm sẽ tìm kiếm chính xác công nghệ áp dụng cho mẻ hàng thông qua chỉ một cú click chuột. Điều này không những giúp công ty giảm được quy mô nhân sự có trình độ kỹ thuật cao mà còn giúp tất cả các mẻ hàng được xử lý với công nghệ đồng nhất, từ đó ổn định chất lượng."
hjk_8: "Tích&nbsp;hợp với các thiết&nbsp;bị&nbsp;sản&nbsp;xuất, thiết&nbsp;bị&nbsp;phòng&nbsp;lab"
hjk_9: "Với các thiết bị vận hành tự động nhưng độc lập, chúng tôi có thể giúp kết nối vào hệ thống phần mềm để hình thành một hệ thống nhất."
hjk_10: "Chúng tôi cũng có thể giúp cải tạo các thiết bị đang vận hành bằng tay thông qua công tắc và nút nhấn thành điều kiển tự động theo quy trình và kết nối với hệ thống phần mềm."
hjk_11: "Tuỳ&nbsp;chỉnh phù&nbsp;hợp cho từng nhà&nbsp;máy"
hjk_12: "Hiểu rằng mỗi nhà máy có hệ thống quản lý khác nhau, chúng tôi luôn khảo sát kỹ càng để thiết kế và triển khai cho phù hợp, liên tục cải tiến để giúp hoạt động của nhà máy ngày càng hiệu quả hơn."
hjk_13: "Bên cạnh đó, trong quá trình hợp tác, chúng tôi cũng có khả năng tư vấn cho khách hàng cải tiến quy trình để đạt hiệu quả và tiết kiệm."
hjk_14: "Rất dễ sử&nbsp;dụng!"
hjk_15: "Chúng tôi luôn hướng đến cách vận hành phần mềm đơn giản nhất, cần ít thao tác nhất để người công nhân đứng máy, nhân viên văn phòng dù không có kiến thức tin học cơ bản vẫn có thể sử dụng được một cách dễ dàng."
benefits_title: "Vì sao nhà&nbsp;máy nên chọn Alpha&nbsp;Software?"
hjk_16: "Cải&nbsp;thiện rõ&nbsp;rệt chất&nbsp;lượng sản&nbsp;phẩm"
hjk_17: "Nhờ kinh nghiệm từ thời gian dài làm kỹ thuật công nghệ trong ngành, chúng tôi biết cách ánh xạ tri thức công nghệ của chuyên gia nội bộ của nhà máy hoặc chuyên gia bên ngoài, áp dụng công nghệ đó một cách tự động, chính xác vào sản xuất nhờ đó cải thiện mạnh mẽ tỷ lệ sản phẩm đúng ngay từ đầu (RFT—Right First Time)."
hjk_18: "Giảm thiểu rủi&nbsp;ro sai&nbsp;sót của công&nbsp;nhân"
hjk_19: "Trải qua các vị trí công việc trong ngành từ quản lý kỹ thuật, quản lý dây chuyền đến quản lý nhà máy nhuộm, chúng tôi hiểu được những rủi ro sai sót có thể có trong quá trình thực hiện công việc của nhân viên các cấp. Nhờ đó, phần mềm của Alpha&nbsp;Software có khả năng ngăn ngừa lỗi rất cao."
hjk_20: "Giảm&nbsp;thiểu nhu&nbsp;cầu nhân&nbsp;sự"
hjk_21: "Trong quá trình khảo sát và phát triển phần mềm, chúng tôi sẽ nhận diện những thao tác nào có thể được phần mềm tự động thực hiện. Nhờ đó làm giảm nhu cầu và chi phí nhân sự."
hjk_22: "Tích&nbsp;hợp với các thiết&nbsp;bị có sẵn"
hjk_23: "Chúng tôi có trình độ và kinh nghiệm để kết nối với các thiết bị tự động hoặc cải tạo thiết bị đang vận hành bằng công tắc tay thành vận hành tự động. Nhờ đó giảm nhu cầu nhân sự có trình độ tay nghề cao và giảm thao tác sai của người vận hành."
products_title: "Chi&nbsp;tiết về các sản&nbsp;phẩm của Alpha&nbsp;Software"
alpha_smart_dyehouse: '<span class="mini-h3">Hệ&nbsp;thống phần&nbsp;mềm quản&nbsp;lý nhà&nbsp;máy&nbsp;<wbr /></span>Alpha&nbsp;Smart&nbsp;Dyehouse'
alpha_smart_dyehouse_content: '<h4>1. Giới&nbsp;thiệu</h4>
            <p>
              <strong>Alpha Smart Dyehouse</strong> là một giải pháp phần mềm
              toàn diện giúp số hoá và tự động hoá toàn bộ quy trình nhuộm trong
              nhà máy. Hệ thống tích hợp từ khâu quản lý đơn hàng, lập kế hoạch
              nhuộm, tạo công thức màu, đến thực hiện nhuộm, kiểm tra chất lượng
              và đóng gói.
            </p>
            <p>
              Đơn công nghệ nhuộm là một thành tố quan trọng ảnh hưởng lớn đến
              chất lượng nhuộm được phần mềm quản lý một cách thông minh và tự
              động phát sinh mà không cần một kỹ thuật viên chuyên biệt cho
              nhiệm vụ này.
            </p>
            <p>
              Đường đi công nghệ của mẻ hàng cũng được phần mềm dẫn dắt đảm bảo
              không có mẻ hàng nào được xử lý thiếu, thừa hay sai trình tự các
              công đoạn.
            </p>
            <p>
              Giải pháp còn cho phép kết nối trực tiếp với các thiết bị phần
              cứng trong nhà máy nhằm nâng cao mức độ tự động hoá và giảm thiểu
              sai sót trong sản xuất.
            </p>

            <h4>2. Các tính&nbsp;năng</h4>
            <p>
              Phần mềm <strong>Alpha Smart Dyehouse</strong> hỗ trợ đầy đủ các
              công đoạn trong quy trình nhuộm, bao gồm:
            </p>
            <ul>
              <li>Quản lý và theo dõi tiến độ đơn hàng</li>
              <li>Lập kế hoạch nhuộm</li>
              <li>Quản lý công thức màu và đơn công nghệ</li>
              <li>Phần mềm cân thuốc và định lượng hoá chất</li>
              <li>Quản lý quy trình công nghệ</li>
              <li>Quản lý tiêu chuẩn chất lượng</li>
              <li>Thực hiện nhuộm và các công đoạn sau nhuộm</li>
              <li>Kiểm tra chất lượng và đóng gói</li>
              <li>Quản lý kho hoá chất, mộc và thành phẩm</li>
            </ul>
            <h4>
              3. Khả&nbsp;năng kết&nbsp;nối thiết&nbsp;bị trong
              nhà&nbsp;máy&nbsp;nhuộm
            </h4>
            <p>
              Phần mềm <strong>Alpha Smart Dyehouse</strong> có khả năng tích
              hợp sâu với hệ thống thiết bị của nhà máy nhuộm. Giải pháp hỗ trợ
              giao tiếp với các thiết bị như cân thuốc, máy rót màu, máy bơm hoá
              chất, thiết bị quang phổ LAB, v.v. Đặc biệt, Alpha phát triển hai
              thiết bị phần cứng chuyên biệt gồm Cân thuốc Alpha và Bộ quy trình
              Alpha (bộ điều khiển máy nhuộm), giúp đảm bảo sự đồng bộ và hiệu
              quả cao trong toàn bộ hệ thống.
            </p>'
alpha_dyes_weighing: '<span class="mini-h3">Cân thuốc&nbsp;nhuộm thông&nbsp;minh&nbsp;<wbr /></span>Alpha&nbsp;Dyes&nbsp;Weighing'
alpha_dyes_weighing_content: '<h4>1. Giới&nbsp;thiệu</h4>
            <p>
              <strong>Alpha Dyes Weighing</strong> là phần mềm chuyên dụng hỗ
              trợ quá trình cân thuốc nhuộm trong các nhà máy dệt nhuộm. Phần
              mềm được thiết kế nhằm đảm bảo độ chính xác, an toàn và tiện lợi
              tối đa cho người vận hành trong suốt quá trình chuẩn bị thuốc
              nhuộm.
            </p>
            <h4>2. Các điểm nổi&nbsp;bật</h4>
            <ul class="spaced-items">
              <li>
                <b>Hệ thống đèn LED chỉ thị vị trí:</b> Hỗ trợ người vận hành dễ
                dàng xác định vị trí thùng thuốc nhuộm cần lấy thông qua hệ
                thống đèn LED hiển thị trực quan.
              </li>
              <li>
                <b>Xác thực bằng mã QR:</b> Quét mã QR để đảm bảo lấy đúng loại
                thuốc nhuộm, tránh nhầm lẫn và nâng cao tính an toàn trong sản
                xuất.
              </li>
              <li>
                <b>Dẫn dắt quá trình cân bằng lời nói:</b> Phần mềm có chức năng
                hướng dẫn người vận hành từng bước trong quá trình cân thông qua
                giọng nói, giúp thao tác nhanh chóng và giảm sai sót.
              </li>
              <li>
                <b>Kết nối đa cân điện tử:</b> Hỗ trợ kết nối đồng thời với 3
                cân điện tử. Phần mềm tương thích với mọi thương hiệu cân điện
                tử miễn là có chức năng truyền dữ liệu về máy tính.
              </li>
              <li>
                <b
                  >Thích nghi với sai lệch cường độ màu giữa các lô thuốc
                  nhuộm:</b
                >
                Các lô thuốc nhuộm mua vào thường có cường độ màu sai lệch từ 3%
                đến 5% so với lô gốc. Phần mềm tự động điều chỉnh để thích nghi
                với sự dao động này, giúp tránh lỗi sai màu khi chuyển sang sử
                dụng lô thuốc nhuộm mới.
              </li>
              <li>
                <b>Linh hoạt về phần cứng:</b> Alpha cung cấp phần mềm. Máy
                tính, cân điện tử và kệ chứa thùng thuốc nhuộm sẽ do khách hàng
                chủ động đầu tư. Điều này giúp tối ưu chi phí đầu tư ban đầu và
                tăng tính linh hoạt cho từng nhà máy.
              </li>
            </ul>'
