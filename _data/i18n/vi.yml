reviews_title: "Khách&nbsp;hàng nhận&nbsp;xét gì về Alpha&nbsp;Software?"
female_title: "Bà"
male_title: "Ông"
of: ""
hjk_33: '<p>Phần mềm Alpha đã giúp SPICA kết nối hiệu quả với các thiết bị nhuộm
            như máy Spectro, máy hút màu và controller máy nhuộm, từ đó giảm
            thiểu lỗi thao tác thủ công. Việc quản lý công thức nhuộm trở nên dễ
            dàng hơn, lập kế hoạch nhuộm chính xác và kiểm soát toàn bộ quy
            trình chặt chẽ qua mã QR và hệ thống báo cáo trực quan.</p>
          <p>Sau khi triển khai phần mềm, tỷ lệ nhuộm đạt ngay lần đầu (RFT) tăng
            từ 80% lên 90% theo mẻ, và từ 90% lên 95% theo khối lượng—hướng đến
            mục tiêu đạt 93% và 98% trong thời gian tới.</p>'
co_title_1: "Phó Tổng Giám&nbsp;đốc<br />"
hjk_34: '<p>Phần mềm Alpha&nbsp;Software hỗ trợ rất tốt cho công ty, nhất là
            công ty sản xuất nhiều công đoạn. Hơn nữa, Alpha thì có lợi thế hơn
            những phần mềm quản lý khác do có thể tuỳ biến linh hoạt và chi tiết
            theo yêu cầu của người sử dụng. Mọi thông số đều rất rõ ràng và chi
            tiết.</p>'
co_title_2: "Trợ&nbsp;lý Giám&nbsp;đốc<br />"
our_story_title: "Câu&nbsp;chuyện của Alpha&nbsp;Software"
co_title_3: "Nhà sáng lập"
hjk_35: '<p class="mt-md-0">
          Alpha&nbsp;Software được thành lập vào năm 2021 bởi Ông Phan Đức Tuấn
          Anh, người có hơn 28 năm kinh nghiệm thực tiễn trong lĩnh vực dệt
          may—trong đó có 13 năm là kỹ thuật viên nhuộm và 15 năm làm Giám đốc
          nhà máy. Với nền tảng vững chắc về Hoá học Hữu cơ cùng sự hiểu biết
          sâu sắc về quản lý nhà máy và phát triển phần mềm, ông Tuấn Anh đã
          giúp chúng tôi cung cấp các giải pháp công nghệ thực tiễn đáp ứng nhu
          cầu của các doanh nghiệp dệt may hiện đại.
        </p>'
