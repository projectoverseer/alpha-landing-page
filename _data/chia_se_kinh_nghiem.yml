# Data for the Chia sẻ kinh nghiệm hub (/chia-se-kinh-nghiem/) — topics, series, author.
# Design reference: design/chia-se-kinh-nghiem/01-philosophy.md

author:
  name: "Phan Đức Tuấn Anh"
  role: "Nhà sáng lập Alpha Software"

# Hub sections, in display order. Posts declare `topic: <key>` in front matter.
topics:
  van-hanh:
    label: "Vận hành & hiệu suất"
    desc: "Đo lường và cải thiện OEE, RFT — thêm doanh thu và lợi nhuận từ chính số máy đang có."
  ky-thuat-nhuom:
    label: "Kỹ thuật nhuộm"
    desc: "Phân tích lỗi nhuộm thường gặp và cách xử lý tận gốc, từ kinh nghiệm sản xuất thực tế."
  do-mau:
    label: "Màu sắc & đo màu"
    desc: "Lý thuyết màu sắc, máy quang phổ và quy trình so màu chuẩn giữa nhà máy và khách hàng."

# Series metadata. Posts declare `series: <key>` + `series_part: n`.
series:
  so-hoa-oee:
    label: "Số hóa OEE trong xưởng nhuộm"
  ly-thuyet-mau-sac:
    label: "Lý thuyết màu sắc trong ngành nhuộm"

# Image library for the hub. One entry per picture, keyed by its file slug in
# img/chia-se-kinh-nghiem/ — the alt text, caption and intrinsic size live here
# so a post only ever names the slug (front matter `image:` for the thumbnail,
# or the figure include in the body), and every render of the same picture
# stays consistent.
#
#   w/h  = the LARGEST derivative that ships (also what <img> width/height say)
#   sm   = a 672px derivative exists too, so the srcset has something to choose
#   alt  = what the picture says, for a reader who cannot see it (never keyword
#          stuffing — Google penalises that, and it fails the reader anyway)
images:
