    w: 940
    h: 788
    sm: true
    alt: "Sơ đồ OEE của nhà máy nhuộm bằng 60%, tách theo ba thành phần sẵn sàng, hiệu suất và chất lượng: 80 mẻ lý thuyết chỉ còn 48 mẻ thực tế"
    caption: "Xưởng 20 máy: 80 mẻ lý thuyết mỗi ngày, 48 mẻ đạt chuẩn thực tế — OEE 60%."
